name: iot_smart_farm_app
description: "IoT Smart Farm Management Application"
publish_to: "none"

version: 2.1.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8

  # 🔥 Firebase Core
  firebase_core: ^3.6.0

  # 🔐 Authentication
  firebase_auth: ^5.3.1
  google_sign_in: ^6.2.1

  # 🗂 Firestore (users, crops, devices, irrigation_rules)
  cloud_firestore: ^5.4.4

  # ⚡ Realtime Database (sensor readings, commands)
  firebase_database: ^11.1.4

  # 📁 Storage (profile photos)
  firebase_storage: ^12.3.4

  # 🔔 Push Notifications
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^18.0.1

  # 📸 Image Picker (camera & gallery)
  image_picker: ^1.0.4

  # ✂️ Image Cropper (crop profile photos)
  image_cropper: ^8.0.2

  # 🗺 Map & Location (Farm Location Screen)
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^10.0.0

  # 🌐 HTTP (OpenWeather API)
  http: ^1.1.0

  # 💾 Local Storage (Preferences)
  shared_preferences: ^2.2.0

  # 🕐 Date & Time Formatting
  intl: ^0.18.0

  # 🎨 Icons
  font_awesome_flutter: ^11.0.0
  flutter_svg: ^2.0.10+1

  # 🔊 Sound Effects
  audioplayers: ^6.1.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "app_icon.png"
  adaptive_icon_background: "#161b1d"
  adaptive_icon_foreground: "app_icon.png"
  remove_alpha_ios: true
